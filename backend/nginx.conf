server {
    listen 80;
    server_name 13.201.57.73.nip.io;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 13.201.57.73.nip.io;

    ssl_certificate /etc/letsencrypt/live/13.201.57.73.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.201.57.73.nip.io/privkey.pem;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://backend:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /employees {
        proxy_pass http://backend:8080/employees;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /employees/ {
        proxy_pass http://backend:8080/employees/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
